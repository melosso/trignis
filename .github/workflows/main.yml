name: Build And Push As Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.3.2)'
        required: true
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      PROJECT_PATH: Source
      PUBLISH_WIN: Deployment-Windows
      PUBLISH_LIN: Deployment-Linux
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          7.0.x
          9.0.x
    - name: Install dotnet-project-licenses tool
      run: dotnet tool install -g dotnet-project-licenses
    - name: Create and push tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${{ github.event.inputs.tag_name }}" -m "Release ${{ github.event.inputs.tag_name }}"
        git push origin "${{ github.event.inputs.tag_name }}"
    - name: Publish Windows (win-x64)
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          -c Release \
          -r win-x64 \
          --self-contained false \
          -p:PublishSingleFile=true \
          -p:DebugType=None \
          -p:DebugSymbols=false \
          --framework net9.0 \
          -o ${{ env.PUBLISH_WIN }}
    - name: Publish Linux (linux-x64)
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          -c Release \
          -r linux-x64 \
          --self-contained false \
          -p:PublishSingleFile=true \
          -p:DebugType=None \
          -p:DebugSymbols=false \
          --framework net9.0 \
          -o ${{ env.PUBLISH_LIN }}
    - name: Prepare deployment structure
      run: |
        for DIR in "${{ env.PUBLISH_WIN }}" "${{ env.PUBLISH_LIN }}"; do
          # Remove unnecessary files
          rm -f "$DIR"/*.pdb "$DIR"/*.xml "$DIR"/*.deps.json "$DIR"/*.dev.json "$DIR"/*.example \
                "$DIR/Trignis.staticwebassets.endpoints.json" "$DIR/web.config"
          # Create folder structure
          mkdir -p "$DIR/exports" "$DIR/Environments" "$DIR/log" "$DIR/license/packages"
          # Copy files
          cp -r Source/Environments/* "$DIR/Environments/" || true
          cp -r Source/SQL "$DIR/sql" || true
          cp LICENSE "$DIR/license/license.txt" || true
          echo "https://github.com/melosso/trignis" > "$DIR/license/source.txt"
          # Generate package licenses
          dotnet-project-licenses --input Source/Trignis.csproj --export-license-texts \
            --output-directory "$DIR/license/packages" \
            || echo "Warning: Failed to collect package licenses"
        done
    - name: Create Windows service batch file
      run: |
        cat > ${{ env.PUBLISH_WIN }}/TrignisBackgroundService.bat << 'EOF'
        @echo off
        setlocal enabledelayedexpansion

        set SERVICE_NAME=TrignisAgent
        set DISPLAY_NAME=Trignis Agent - SQL Change Monitor
        set EXE_PATH=%~dp0Trignis.exe

        if "%1"=="" (
            echo Usage: %0 {install^|start^|stop^|status^|uninstall^|test}
            echo.
            echo Commands:
            echo   install   - Install the service
            echo   start     - Start the service
            echo   stop      - Stop the service
            echo   status    - Check service status and recent logs
            echo   uninstall - Stop and uninstall the service
            echo   test      - Run in console mode for testing
            goto :eof
        )

        if /i "%1"=="install" (
            echo Installing "%SERVICE_NAME%"...
            sc create "%SERVICE_NAME%" binPath= "\"%~dp0Trignis.exe\"" start= auto displayname= "%DISPLAY_NAME%"
            if !ERRORLEVEL! EQU 0 (
                echo Service installed successfully.
                echo Use '%0 start' to start it.
            ) else (
                echo Failed to install service. Make sure you're running as Administrator.
            )
            goto :eof
        )

        if /i "%1"=="start" (
            echo Starting "%SERVICE_NAME%"...
            sc start "%SERVICE_NAME%"
            if !ERRORLEVEL! EQU 0 (
                echo Service started successfully.
            ) else (
                echo Failed to start service. Check Event Viewer for errors.
            )
            goto :eof
        )

        if /i "%1"=="stop" (
            echo Stopping "%SERVICE_NAME%"...
            sc stop "%SERVICE_NAME%"
            if !ERRORLEVEL! EQU 0 (
                echo Service stopped successfully.
            ) else (
                echo Failed to stop service or service was not running.
            )
            goto :eof
        )

        if /i "%1"=="status" (
            echo Querying "%SERVICE_NAME%" status...
            sc query "%SERVICE_NAME%"
            echo.
            echo Recent Application Event Log entries:
            powershell -Command "Get-EventLog -LogName Application -Source '.NET Runtime' -Newest 5 | Format-Table -AutoSize" 2>nul
            if !ERRORLEVEL! NEQ 0 (
                echo No recent .NET Runtime events found.
            )
            goto :eof
        )

        if /i "%1"=="uninstall" (
            echo Stopping and uninstalling "%SERVICE_NAME%"...
            sc stop "%SERVICE_NAME%" >nul 2>&1
            timeout /t 2 /nobreak > nul
            sc delete "%SERVICE_NAME%"
            if !ERRORLEVEL! EQU 0 (
                echo Service uninstalled successfully.
            ) else (
                echo Failed to uninstall service. Make sure you're running as Administrator.
            )
            goto :eof
        )

        if /i "%1"=="test" (
            echo Testing Trignis in console mode...
            echo Press Ctrl+C to stop
            echo.
            "%~dp0Trignis.exe"
            goto :eof
        )

        echo Invalid command: %1
        echo Use '%0' without arguments for help.
        goto :eof
        EOF
    - name: Create README files
      run: |
        for DIR in "${{ env.PUBLISH_WIN }}" "${{ env.PUBLISH_LIN }}"; do
          cat > "$DIR/README.txt" << 'EOF'
        TRIGNIS SERVICE DEPLOYMENT
        ==========================

        TESTING
        -------
        1. Run 'TrignisBackgroundService.bat test' (Windows) or './Trignis' (Linux) to test in console mode
        2. Check logs in the 'log' folder
        3. Press Ctrl+C to stop the console test

        SERVICE INSTALLATION
        --------------------
        Windows:
        1. Run 'TrignisBackgroundService.bat install' as Administrator
        2. Run 'TrignisBackgroundService.bat start' to start the service
        3. Run 'TrignisBackgroundService.bat status' to check if it's running

        Linux (systemd):
        1. Copy Trignis to /usr/local/bin/trignis
        2. Create a systemd unit file and enable it

        SERVICE MANAGEMENT (Windows)
        ------------------
        - Start: TrignisBackgroundService.bat start
        - Stop: TrignisBackgroundService.bat stop
        - Status: TrignisBackgroundService.bat status
        - Uninstall: TrignisBackgroundService.bat uninstall

        TROUBLESHOOTING
        ---------------
        If the service fails to start:
        1. Check logs in the 'log' folder
        2. Run 'TrignisBackgroundService.bat status' to see service status
        3. Check Windows Event Viewer > Application logs (if enabled)
        4. Test in console mode first using 'TrignisBackgroundService.bat test'

        CONFIGURATION
        -------------
        Edit configuration files in the 'Environments' folder
        Default environment: Production
        EOF
        done
    - name: Create version files and zip
      run: |
        for PLATFORM in Windows Linux; do
          DIR="Deployment-$PLATFORM"
          echo "${{ github.event.inputs.tag_name }}" > "$DIR/.version.txt"
          echo "Built: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "$DIR/.version.txt"
          echo "Commit: ${{ github.sha }}" >> "$DIR/.version.txt"
          zip -r "${{ github.event.inputs.tag_name }}-Deployment-$PLATFORM.zip" "$DIR"
        done
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag_name }}
        name: ${{ github.event.inputs.tag_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          ${{ github.event.inputs.tag_name }}-Deployment-Windows.zip
          ${{ github.event.inputs.tag_name }}-Deployment-Linux.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Deploy to target environment
      run: |
        echo "Deploying version ${{ github.event.inputs.tag_name }}"
        unzip -o "${{ github.event.inputs.tag_name }}-Deployment-Windows.zip"
