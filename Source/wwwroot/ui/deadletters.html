        <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
        <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>

      Settings

          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        </a>
        <span class="tooltip tooltip-above tooltip-right">View on GitHub</span>
      </span>
    </div>
    <button class="btn-logout" onclick="logout()">Log Out</button>
  </div>
</aside>

<!-- Detail Drawer -->
<div class="drawer-backdrop" id="drawerBackdrop" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">Dead Letter</span>
    <button class="btn-icon" onclick="closeDrawer()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<main>
  <div class="page-header">
    <div class="page-title">
      <h1 class="select-none">Dead Letters</h1>
      <span class="badge badge-muted" id="totalCount"></span>
    </div>
    <div class="header-actions">
      <input type="search" id="searchInput" placeholder="Search…" style="width:200px" oninput="debounceLoad()">
      <select id="objectFilter" onchange="load(1)">
        <option value="">All objects</option>
      </select>
      <button class="btn btn-outline" onclick="load(currentPage)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <div class="table-wrapper" style="margin:0;border-radius:0;border-left:none;border-right:none;border-bottom:none;flex:1">
    <div class="scroll-area">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Object</th>
            <th>Database</th>
            <th>Error</th>
            <th>Timestamp</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5" class="empty-state">Loading…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination-container">
      <div class="flex items-center gap-3">
        <span class="pagination-info" id="pageInfo"></span>
        <select id="pageSizeSelect" onchange="load(1)">
          <option value="25">25 / page</option>
          <option value="50" selected>50 / page</option>
          <option value="100">100 / page</option>
        </select>
      </div>
      <div class="pagination-controls">
        <button class="btn btn-outline" id="prevBtn" onclick="load(currentPage - 1)">Previous</button>
        <button class="btn btn-outline" id="nextBtn" onclick="load(currentPage + 1)">Next</button>
      </div>
    </div>
  </div>
</main>

<script>
let currentPage = 1;
let totalPages = 1;
let debounceTimer = null;
const knownObjects = new Set();

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => load(1), 350);
}

async function load(page = 1) {
  currentPage = page;
  const search = document.getElementById('searchInput').value;
  const objectFilter = document.getElementById('objectFilter').value;
  const pageSize = document.getElementById('pageSizeSelect').value;

  const params = new URLSearchParams({ page, pageSize });
  if (search) params.set('search', search);
  if (objectFilter) params.set('objectFilter', objectFilter);

  const body = document.getElementById('tableBody');
  body.innerHTML = '<tr><td colspan="5" class="empty-state muted">Loading…</td></tr>';

  try {
    const d = await fetch(`/ui/api/deadletters?${params}`).then(r => r.json());
    totalPages = d.total_pages ?? 1;
    const total = d.total ?? 0;

    document.getElementById('totalCount').textContent = `${total} total`;
    document.getElementById('pageInfo').textContent = total
      ? `${(page - 1) * pageSize + 1}–${Math.min(page * pageSize, total)} of ${total}`
      : '0 results';
    document.getElementById('prevBtn').disabled = page <= 1;
    document.getElementById('nextBtn').disabled = page >= totalPages;

    // Populate object filter
    (d.data ?? []).forEach(row => {
      if (row.tracking_object_name && !knownObjects.has(row.tracking_object_name)) {
        knownObjects.add(row.tracking_object_name);
        const sel = document.getElementById('objectFilter');
        const opt = document.createElement('option');
        opt.value = row.tracking_object_name;
        opt.textContent = row.tracking_object_name;
        sel.appendChild(opt);
      }
    });

    if (!d.data?.length) {
      body.innerHTML = '<tr><td colspan="5" class="empty-state">No dead letters found</td></tr>';
      return;
    }

    body.innerHTML = d.data.map(row => `<tr class="clickable" onclick='openDrawer(${JSON.stringify(row)})'>
      <td class="col-mono">${row.id}</td>
      <td><span class="badge badge-muted">${esc(row.tracking_object_name)}</span></td>
      <td class="col-mono">${esc(row.database_name)}</td>
      <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:hsl(var(--destructive));font-size:0.8rem">${esc(row.error_message)}</td>
      <td class="col-mono">${esc(row.timestamp ?? '—')}</td>
    </tr>`).join('');
  } catch(e) {
    body.innerHTML = `<tr><td colspan="5" class="empty-state">Error: ${esc(e.message)}</td></tr>`;
  }
}

function openDrawer(row) {
  const body = document.getElementById('drawerBody');

  let prettyPayload = row.data ?? '';
  try { prettyPayload = JSON.stringify(JSON.parse(row.data), null, 2); } catch(e) {}

  body.innerHTML = `
    <div class="drawer-field">
      <label>ID</label>
      <div class="drawer-field-value col-mono">${esc(row.id)}</div>
    </div>
    <div class="drawer-field">
      <label>Object</label>
      <div class="drawer-field-value">${esc(row.tracking_object_name)}</div>
    </div>
    <div class="drawer-field">
      <label>Database</label>
      <div class="drawer-field-value col-mono">${esc(row.database_name)}</div>
    </div>
    <div class="drawer-field">
      <label>Source Key</label>
      <div class="drawer-field-value col-mono">${esc(row.source_key)}</div>
    </div>
    <div class="drawer-field">
      <label>Timestamp</label>
      <div class="drawer-field-value col-mono">${esc(row.timestamp ?? '—')}</div>
    </div>
    <div class="drawer-field">
      <label>Error</label>
      <div class="drawer-field-value" style="color:hsl(var(--destructive));font-size:0.8125rem">${esc(row.error_message)}</div>
    </div>
    <div class="drawer-field">
      <label>Data Hash</label>
      <div class="drawer-field-value col-mono" style="font-size:0.7rem">${esc(row.data_hash)}</div>
    </div>
    <div class="drawer-field">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.375rem">
        <label style="margin:0">Payload</label>
        <button class="btn btn-ghost" style="height:1.75rem;font-size:0.75rem" onclick="copyPayload()">Copy</button>
      </div>
      <div class="code-block" id="drawerPayload">${esc(prettyPayload)}</div>
    </div>`;

  document.getElementById('drawerBackdrop').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function copyPayload() {
  const text = document.getElementById('drawerPayload').textContent;
  navigator.clipboard.writeText(text).catch(() => {});
}

function closeDrawer() {
  document.getElementById('drawerBackdrop').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

load(1);
fetch('/ui/api/overview').then(r => r.json()).then(d => {
  const v = (d.version ?? '').split('+')[0];
  document.getElementById('sidebarVersion').textContent = v ? `v${v}` : '';
}).catch(() => {});

function logout() {
  fetch('/ui/api/auth/logout', { method: 'POST', credentials: 'include' })
    .finally(() => { window.location.href = '/ui/login'; });
}
</script>
</body>
</html>
