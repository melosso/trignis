          <filter id="trig-blur-3" width="22" height="22" x="6" y="8" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse"><feFlood flood-opacity="0" result="BackgroundImageFix"/><feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/><feGaussianBlur result="effect1_foregroundBlur" stdDeviation="2.5"/></filter>

        <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>

      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings

        </a>
        <span class="tooltip tooltip-above tooltip-right">View on GitHub</span>
      </span>
    </div>
    <button class="btn-logout" onclick="logout()">Log Out</button>
  </div>
</aside>

<main>
  <div class="page-header">
    <div class="page-title">
      <h1 class="select-none">Settings</h1>
      <span class="page-subtitle">Read-only view</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="load()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <div class="page-body">
    <div class="settings-grid">

      <!-- Global Change Tracking -->
      <div class="card">
        <div class="card-header"><span class="card-title">Change Tracking</span></div>
        <div class="card-body" id="globalSettingsBody">
          <span class="muted" style="font-size:0.8rem">Loading…</span>
        </div>
      </div>

      <!-- Server -->
      <div class="card">
        <div class="card-header"><span class="card-title">Server</span></div>
        <div class="card-body" id="serverBody">
          <span class="muted" style="font-size:0.8rem">Loading…</span>
        </div>
      </div>

      <!-- Dead Letter Queue -->
      <div class="card">
        <div class="card-header"><span class="card-title">Dead Letter Queue</span></div>
        <div class="card-body" id="dlqBody">
          <span class="muted" style="font-size:0.8rem">Loading…</span>
        </div>
      </div>

      <!-- Logging -->
      <div class="card">
        <div class="card-header"><span class="card-title">Logging</span></div>
        <div class="card-body" id="loggingBody">
          <span class="muted" style="font-size:0.8rem">Loading…</span>
        </div>
      </div>

    </div>
  </div>
</main>

<script>
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function settingItem(label, value, desc) {
  return `<div class="settings-item">
    <div>
      <div class="settings-item-label">${label}</div>
      ${desc ? `<div class="settings-item-desc">${desc}</div>` : ''}
    </div>
    <span class="settings-item-value">${esc(value)}</span>
  </div>`;
}

function boolItem(label, value, desc) {
  return settingItem(label, value ? 'Enabled' : 'Disabled', desc);
}

async function load() {
  try {
    const d = await fetch('/ui/api/settings').then(r => r.json());
    const g = d.global ?? {};
    const srv = d.server ?? {};
    const log = d.logging ?? {};

    document.getElementById('globalSettingsBody').innerHTML = [
      settingItem('Polling Interval', g.pollingIntervalSeconds != null ? `${g.pollingIntervalSeconds}s` : '—'),
      boolItem('Export to File', g.exportToFile),
      boolItem('Export to API', g.exportToApi),
      settingItem('Retry Count', g.retryCount ?? '—'),
      settingItem('Retry Delay', g.retryDelaySeconds != null ? `${g.retryDelaySeconds}s` : '—'),
      boolItem('Payload Batching', g.enablePayloadBatching),
      settingItem('Max Records / Batch', g.maxRecordsPerBatch ?? '—'),
      settingItem('Max Payload Size', g.maxPayloadSizeBytes != null ? `${Math.round(g.maxPayloadSizeBytes / 1024 / 1024)}MB` : '—'),
    ].join('');

    document.getElementById('serverBody').innerHTML = [
      settingItem('Host', srv.host ?? '—'),
      settingItem('Port', srv.port ?? '—'),
      settingItem('Cache Duration', srv.cache_duration_seconds != null ? `${srv.cache_duration_seconds}s` : '—'),
    ].join('');

    document.getElementById('dlqBody').innerHTML = [
      settingItem('Retention', g.deadletterRetentionDays != null ? `${g.deadletterRetentionDays} days` : '—'),
      boolItem('Monitor', g.deadLetterMonitorEnabled),
      settingItem('Threshold', g.deadLetterThreshold ?? '—'),
      settingItem('Check Interval', g.deadLetterCheckIntervalMinutes != null ? `${g.deadLetterCheckIntervalMinutes}min` : '—'),
    ].join('');

    document.getElementById('loggingBody').innerHTML = [
      settingItem('Minimum Level', log.min_level ?? '—'),
      settingItem('Sinks', (log.sinks ?? []).join(', ') || '—'),
    ].join('');

  } catch(e) {
    const msg = `<div class="muted" style="font-size:0.8rem">Failed to load: ${esc(e.message)}</div>`;
    ['globalSettingsBody','serverBody','dlqBody','loggingBody'].forEach(id => {
      document.getElementById(id).innerHTML = msg;
    });
  }
}

load();

function logout() {
  fetch('/ui/api/auth/logout', { method: 'POST', credentials: 'include' })
    .finally(() => { window.location.href = '/ui/login'; });
}
</script>
</body>
</html>
