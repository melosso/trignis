<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · Trignis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/css/site.css" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>

<aside>
  <div class="brand select-none">
    <div class="brand-avatar">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" class="brand-avatar-bg" aria-hidden="true">
        <g clip-path="url(#trig-clip)">
          <rect width="20" height="20" fill="#000" rx="5.5"/>
          <rect width="20" height="20" fill="url(#trig-grad)" fill-opacity="0.2" rx="5.5"/>
          <g filter="url(#trig-blur-1)" opacity="0.3"><circle cx="16" cy="17" r="6" fill="#FF64B4" fill-opacity="0.671"/></g>
          <g filter="url(#trig-blur-2)" opacity="0.1"><circle cx="16" cy="16" r="6" fill="#FF64B4" fill-opacity="0.671"/></g>
          <g filter="url(#trig-blur-3)" opacity="0.4"><circle cx="17" cy="19" r="6" fill="#FF64B4" fill-opacity="0.671"/></g>
          <rect width="20" height="20" fill="#FF64B4" fill-opacity="0.15" rx="5.5"/>
          <g style="mix-blend-mode:hard-light"><rect width="20" height="20" fill="#6A62FF" fill-opacity="0.1" rx="5.5"/></g>
        </g>
        <rect width="19" height="19" x="0.5" y="0.5" stroke="#FDFDFD" stroke-opacity="0.1" rx="5"/>
        <defs>
          <filter id="trig-blur-1" width="32" height="32" x="0" y="1" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse"><feFlood flood-opacity="0" result="BackgroundImageFix"/><feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/><feGaussianBlur result="effect1_foregroundBlur" stdDeviation="5"/></filter>
          <filter id="trig-blur-2" width="22" height="22" x="5" y="5" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse"><feFlood flood-opacity="0" result="BackgroundImageFix"/><feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/><feGaussianBlur result="effect1_foregroundBlur" stdDeviation="2.5"/></filter>
          <filter id="trig-blur-3" width="22" height="22" x="6" y="8" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse"><feFlood flood-opacity="0" result="BackgroundImageFix"/><feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/><feGaussianBlur result="effect1_foregroundBlur" stdDeviation="2.5"/></filter>
          <linearGradient id="trig-grad" x1="10" x2="10" y1="0" y2="20" gradientUnits="userSpaceOnUse"><stop stop-color="#FDFDFD"/><stop offset="1" stop-color="#FDFDFD" stop-opacity="0"/></linearGradient>
          <clipPath id="trig-clip"><rect width="20" height="20" fill="#FDFDFD" rx="5.5"/></clipPath>
        </defs>
      </svg>
      <svg class="brand-avatar-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#FDFDFD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
        <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
        <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
      </svg>
    </div>
    <span class="brand-name">Trignis</span>
  </div>

  <div class="nav-group">
    <div class="nav-label">Navigation</div>
    <a href="/ui/dashboard" class="nav-item active">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/ui/environments" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      Environments
    </a>
    <a href="/ui/settings" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>
    <a href="/ui/deadletters" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/><line x1="2" y1="19" x2="9" y2="12"/><line x1="22" y1="19" x2="15" y2="12"/></svg>
      Dead Letters
    </a>
    <a href="/ui/logs" class="nav-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Logs
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="sidebar-footer-meta">
      <div class="sidebar-version" id="sidebarVersion"></div>
      <span class="tooltip-wrapper">
        <a href="https://github.com/melosso/trignis" target="_blank" rel="noopener" class="github-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        </a>
        <span class="tooltip tooltip-above tooltip-right">View on GitHub</span>
      </span>
    </div>
    <button class="btn-logout" onclick="logout()">Log Out</button>
  </div>
</aside>

<main>
  <div class="page-header">
    <div class="page-title">
      <h1 class="select-none">Dashboard</h1>
      <span class="page-subtitle" id="versionLabel"></span>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="load()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <div class="page-body">

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Environments</div>
        <div class="stat-value" id="statEnvs">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tracking Objects</div>
        <div class="stat-value" id="statObjects">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Endpoints</div>
        <div class="stat-value" id="statEndpoints">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Dead Letters</div>
        <div class="stat-value" id="statDl">—</div>
        <div class="stat-sub" id="statDlSub"></div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Service Health</span>
          <span class="badge badge-muted" id="healthBadge">—</span>
        </div>
        <div class="card-body">
          <div class="kv-grid" id="healthGrid">
            <span class="kv-key">Status</span><span class="kv-val" id="healthStatus">—</span>
            <span class="kv-key">Uptime</span><span class="kv-val" id="healthUptime">—</span>
            <span class="kv-key">Version</span><span class="kv-val" id="healthVersion">—</span>
            <span class="kv-key">Database</span><span class="kv-val" id="healthDb">—</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Connection Health</span></div>
        <div class="card-body" id="connHealthBody">
          <span class="muted" style="font-size:0.8rem">Loading…</span>
        </div>
      </div>
    </div>

    <div class="card flex flex-col" style="flex:1;min-height:200px">
      <div class="card-header">
        <span class="card-title">Sync State</span>
        <span class="badge badge-muted" id="syncCount"></span>
      </div>
      <div class="table-wrapper" style="border:none;border-radius:0;flex:1">
        <div class="scroll-area">
          <table>
            <thead>
              <tr>
                <th>Object</th>
                <th>Version</th>
                <th>Last Sync</th>
              </tr>
            </thead>
            <tbody id="syncBody">
              <tr><td colspan="3" class="empty-state">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</main>

<script>
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function load() {
  await Promise.all([loadOverview(), loadHealth(), loadConnections(), loadSyncState()]);
}

async function loadOverview() {
  try {
    const d = await fetch('/ui/api/overview').then(r => r.json());
    document.getElementById('statEnvs').textContent = d.environment_count ?? '—';
    document.getElementById('statObjects').textContent = d.tracking_object_count ?? '—';
    document.getElementById('statEndpoints').textContent = d.endpoint_count ?? '—';
    document.getElementById('statDl').textContent = d.dead_letters?.total ?? '—';
    if (d.dead_letters) {
      document.getElementById('statDlSub').textContent =
        `${d.dead_letters.last_24h ?? 0} last 24h · ${d.dead_letters.last_hour ?? 0} last hour`;
    }
    const v = (d.version ?? '').split('+')[0];
    document.getElementById('versionLabel').textContent = v ? `v${v}` : '';
    document.getElementById('sidebarVersion').textContent = v ? `v${v}` : '';
  } catch(e) { console.error('overview', e); }
}

async function loadHealth() {
  try {
    const d = await fetch('/health').then(r => r.json());
    document.getElementById('healthStatus').textContent = d.status ?? '—';
    document.getElementById('healthUptime').textContent = d.uptime ?? '—';
    document.getElementById('healthVersion').textContent = (d.version ?? '').split('+')[0] || '—';
    document.getElementById('healthDb').textContent = d.checks?.database?.status ?? '—';
    const ok = d.status === 'healthy';
    const badge = document.getElementById('healthBadge');
    badge.textContent = d.status ?? 'unknown';
    badge.className = `badge ${ok ? 'badge-success' : 'badge-warning'}`;
  } catch(e) {
    document.getElementById('healthBadge').textContent = 'unavailable';
    document.getElementById('healthBadge').className = 'badge badge-muted';
  }
}

async function loadConnections() {
  const el = document.getElementById('connHealthBody');
  try {
    const d = await fetch('/health/connections').then(r => r.json());
    const entries = Object.entries(d);
    if (!entries.length) {
      el.innerHTML = '<span class="muted" style="font-size:0.8rem">No connections monitored</span>';
      return;
    }
    el.innerHTML = '<div class="kv-grid">' + entries.map(([k, v]) => {
      const ok = v?.is_healthy;
      const dot = `<span class="status-dot ${ok ? 'ok' : 'err'}"></span>`;
      const label = ok ? 'Healthy' : esc(v?.last_error ?? 'Unhealthy');
      return `<span class="kv-key">${esc(k)}</span>
              <span class="kv-val flex items-center gap-2">${dot} ${label}</span>`;
    }).join('') + '</div>';
  } catch(e) {
    el.innerHTML = '<span class="muted" style="font-size:0.8rem">Health endpoint unavailable</span>';
  }
}

function reltime(iso) {
  if (!iso) return '—';
  const s = (Date.now() - new Date(iso)) / 1000;
  if (s < 60)    return 'just now';
  if (s < 3600)  return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
}

async function loadSyncState() {
  const body = document.getElementById('syncBody');
  try {
    const d = await fetch('/health/state').then(r => r.json());
    const envs = d.environments ?? [];
    const totalObjs = envs.reduce((n, e) => n + (e.objects?.length ?? 0), 0);
    document.getElementById('syncCount').textContent =
      `${envs.length} environment${envs.length !== 1 ? 's' : ''} · ${totalObjs} object${totalObjs !== 1 ? 's' : ''}`;

    const rows = envs.flatMap(env => {
      const objs = env.objects ?? [];
      const header = `<tr class="sync-env-row">
        <td colspan="3"><span class="badge badge-muted">${esc(env.name)}</span>
          <span class="muted" style="font-size:0.75rem;margin-left:0.5rem">${objs.length} object${objs.length !== 1 ? 's' : ''}</span>
        </td>
      </tr>`;
      const objRows = objs.map(obj => `<tr>
        <td>${esc(obj.object_name)}</td>
        <td class="col-mono">${obj.last_version ?? '—'}</td>
        <td class="col-mono" title="${esc(obj.last_updated ?? '')}">${reltime(obj.last_updated)}</td>
      </tr>`);
      return [header, ...objRows];
    });

    body.innerHTML = rows.length
      ? rows.join('')
      : '<tr><td colspan="3" class="empty-state">No objects tracked yet</td></tr>';
  } catch(e) {
    body.innerHTML = '<tr><td colspan="3" class="empty-state muted">Sync state unavailable</td></tr>';
  }
}

load();

function logout() {
  fetch('/ui/api/auth/logout', { method: 'POST', credentials: 'include' })
    .finally(() => { window.location.href = '/ui/login'; });
}
</script>
</body>
</html>
